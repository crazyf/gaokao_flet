name: Build Flet APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter 3.41.7 (required by Flet)
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b 3.41.7 $HOME/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flet pymysql

      - name: Build APK (non-interactive)
        run: |
          export PATH="$HOME/flutter/bin:$PATH"
          echo "y" | flet build apk --verbose

      - uses: actions/upload-artifact@v4
        with:
          name: flet-gaokao-apk
          path: build/apk/*.apk