name: Build Flet APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      # 手动安装 Flutter 3.41.7（Flet 要求的版本）
      - name: Install Flutter 3.41.7
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b 3.41.7 $HOME/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet pymysql

      - name: Accept Android licenses
        run: |
          yes | $HOME/flutter/bin/flutter doctor --android-licenses || true

      - name: Build APK
        run: |
          export PATH="$HOME/flutter/bin:$PATH"
          flet build apk --verbose

      - uses: actions/upload-artifact@v4
        with:
          name: flet-gaokao-apk
          path: build/apk/*.apk