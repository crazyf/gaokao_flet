name: Build Kivy APK

on:
  push:               # 当您推送代码到 main 分支时触发
    branches: [ main ]
  workflow_dispatch:  # 也支持在 GitHub 网页上手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]  # 锁定 Python 3.11 版本

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk \
        autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
        libncursesw5-dev cmake libffi-dev libssl-dev

    - name: Setup Android SDK license
      run: |
        mkdir -p ~/.android
        echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.android/repositories.cfg
        yes | sdkmanager --licenses || true

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
        # 注意：这里不需要单独安装 kivy，buildozer 会根据 .spec 文件处理

    - name: Build APK with Buildozer
      run: |
        # 创建一个用于放置 SDK/NDK 的缓存目录，避免每次都重新下载
        mkdir -p ~/.buildozer
        # 执行打包命令
        buildozer -v android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: gaokao-apk
        path: ./bin/*.apk   # 打包成功后，APK 文件会在这个路径下
